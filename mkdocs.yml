# Project information
site_name: FiveAM
site_url: https://albert-rz.github.io/fiveam 
site_author: Albert Ruiz
site_description: >-
  Hotpotch of things.
# Repository
repo_name: albert-rz/fiveam
repo_url: https://github.com/albert-rz/fiveam
edit_uri: ""

# Copyright
copyright: Copyright &copy; 2020 Albert Ruiz

# Configuration
theme:
  name: material
#  custom_dir: material

  # 404 page
  static_templates:
    - 404.html

  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true

  # Default values, taken from mkdocs_theme.yml
  language: en
  features:
    - tabs
    #- instant
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/images/favicon.png
  icon:
    logo: fontawesome/solid/code

# Plugins
plugins:
  - search
  - macros
#  - minify:
#      minify_html: true

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/albert-rz
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/albert-rz/

# Extensions
markdown_extensions:
  - markdown.extensions.admonition
  - markdown.extensions.abbr
  - markdown.extensions.attr_list
  - markdown.extensions.def_list
  - markdown.extensions.footnotes
  - markdown.extensions.meta
  - markdown.extensions.toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/css/custom.css

extra_javascript:
  # - https://cdnjs.cloudflare.com/ajax/libs/brain.js/2.0.0-alpha.12/brain-browser.min.js
  # - https://cdnjs.cloudflare.com/ajax/libs/three.js/r120/three.js
  - https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.3/Chart.js
  - https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.4.0/dist/tf.min.js

# Page tree
nav:
  - Home: index.md
  #- Tensorflow.js:
  #  - Setup: tensorflow/setup.md
  - Machine Learning:
    - Glossary: ml/glossary.md
  - Notes:
    - Docker: notes/docker.md
    - Git: notes/git.md
    - Linux: notes/linux.md
    - VSCode: notes/vscode.md
  - Snippets:
    - Bash: snippets/bash.md
    - Makefile: snippets/makefile.md
    - Python: snippets/python.md



